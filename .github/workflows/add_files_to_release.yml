name: Add Files to Release
on: workflow_dispatch

jobs:
  zip_file:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Get Repo
        uses: actions/checkout@v6.0.2
      - name: Create Zipfile
        uses: nguyenquyhy/zip-release@v0.3.0
        with:
          filename: endgame_expanded.zip
          path: /home/runner/work/endgame-expanded/endgame-expanded/endgame_expanded
          workingDirectory: /home/runner/work/endgame-expanded/endgame-expanded/endgame_expanded
      - name: Upload Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          path: /home/runner/work/endgame-expanded/endgame-expanded/endgame_expanded/endgame_expanded.zip
          archive: false
          
        
